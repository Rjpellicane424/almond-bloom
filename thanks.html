<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Thanks for joining the Almond Bloom waitlist. Take a breath while you're here with a guided inhale, hold, and exhale."
    />
    <meta name="theme-color" content="#c4653f" />
    <title>Thanks For Joining | Almond Bloom</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Jost:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="thanks-page">
    <div class="page-shell">
      <div class="ambient ambient-one"></div>
      <div class="ambient ambient-two"></div>
      <div class="ambient ambient-three"></div>

      <main class="thanks-shell">
        <section class="thanks-card">
          <a class="thanks-brand" href="./index.html" aria-label="Return to Almond Bloom home">
            <span class="brand-mark">
              <img src="./almond-bloom-logo.png" alt="Almond Bloom logo" />
            </span>
            <span class="brand-copy">
              <span class="brand-name">Almond Bloom</span>
              <span class="brand-tagline">The Moment Matters</span>
            </span>
          </a>

          <p class="eyebrow">Waitlist Confirmed</p>
          <h1 class="thanks-title">Thanks for joining the waitlist.</h1>
          <p class="thanks-copy">
            You're on the list. We'll reach out as soon as Almond Bloom is ready
            to share more.
          </p>

          <div class="thanks-breathing">
            <p class="thanks-breathing-kicker">Take a breath while you're here.</p>
            <div class="thanks-breathing-guide" data-breathing-guide aria-label="Guided breathing exercise">
              <div class="thanks-breathing-stage" aria-hidden="true">
                <div class="thanks-breathing-glow"></div>
                <div class="thanks-breathing-ring thanks-breathing-ring-outer"></div>
                <div class="thanks-breathing-ring thanks-breathing-ring-middle"></div>
                <div class="thanks-breathing-core">
                  <span class="thanks-breathing-count" data-breath-count>4</span>
                </div>
              </div>
              <p class="thanks-breathing-phase" data-breath-phase>Inhale</p>
              <p class="thanks-breathing-note">Inhale, hold, exhale. Four seconds each.</p>
            </div>
          </div>

          <div class="thanks-actions">
            <a class="button button-primary" href="./index.html">Back to Home</a>
          </div>
        </section>
      </main>
    </div>
    <script src="./thanks.js"></script>
  </body>
</html>
